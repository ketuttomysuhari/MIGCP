<!DOCTYPE html>

<html lang="id">

<head>

  <meta charset="UTF-8" />

  <title>MIGCP Realtime Survey Monitoring</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>

    * { box-sizing: border-box; }

    html, body {

      margin: 0;

      height: 100%;

      font-family: Arial, sans-serif;

      background: #020617;

    }

    #map {

      width: 100%;

      height: 100vh;

    }

    #togglePanelBtn {

      position: absolute;

      top: 12px;

      left: 12px;

      z-index: 2000;

      width: auto;

      padding: 9px 13px;

      border: none;

      border-radius: 12px;

      background: #2563eb;

      color: white;

      font-weight: bold;

      cursor: pointer;

      box-shadow: 0 4px 14px rgba(0,0,0,.35);

    }

    .panel {

      position: absolute;

      top: 58px;

      left: 12px;

      z-index: 1500;

      width: 315px;

      max-height: calc(100vh - 76px);

      overflow-y: auto;

      background: rgba(255,255,255,.97);

      border-radius: 16px;

      padding: 12px;

      box-shadow: 0 8px 30px rgba(0,0,0,.35);

      transition: .25s ease;

    }

    .panel.hidden {

      transform: translateX(-350px);

      opacity: 0;

      pointer-events: none;

    }

    h3 {

      margin: 0 0 8px;

      font-size: 16px;

      color: #0f172a;

    }

    input, button {

      width: 100%;

      padding: 8px;

      margin: 4px 0;

      border-radius: 9px;

      border: 1px solid #cbd5e1;

      font-size: 13px;

    }

    button {

      border: none;

      color: white;

      background: #2563eb;

      font-weight: bold;

      cursor: pointer;

    }

    .btn-green { background: #16a34a; }

    .btn-red { background: #dc2626; }

    .btn-dark { background: #334155; }

    .box {

      background: #f1f5f9;

      color: #0f172a;

      border-radius: 10px;

      padding: 8px;

      margin-top: 7px;

      font-size: 12.5px;

      line-height: 1.45;

    }

    .status-ok { color: #16a34a; font-weight: bold; }

    .status-warn { color: #dc2626; font-weight: bold; }

    .surveyor-item, .target-item {

      padding: 6px;

      background: white;

      border: 1px solid #e2e8f0;

      border-radius: 8px;

      margin: 4px 0;

      cursor: pointer;

      font-size: 12.5px;

    }

    .surveyor-item:hover, .target-item:hover {

      background: #e0f2fe;

    }

    .small {

      color: #475569;

      font-size: 11.5px;

    }

    .chat-box {

      height: 120px;

      overflow-y: auto;

      background: white;

      border: 1px solid #cbd5e1;

      border-radius: 9px;

      padding: 7px;

      font-size: 12.5px;

    }

    .chat-item {

      border-bottom: 1px solid #e2e8f0;

      padding-bottom: 5px;

      margin-bottom: 5px;

    }

    @media (max-width: 768px) {

      #togglePanelBtn {

        top: 10px;

        left: 10px;

      }

      .panel {

        left: 8px;

        right: 8px;

        bottom: 8px;

        top: auto;

        width: auto;

        max-height: 48vh;

      }

      .panel.hidden {

        transform: translateY(calc(100% + 30px));

      }

    }

  </style>

</head>

<body>

<button id="togglePanelBtn" onclick="togglePanel()">☰ Menu</button>

<div class="panel" id="controlPanel">

  <h3>MIGCP Monitoring</h3>

  <input type="text" id="surveyorName" placeholder="Nama surveyor wajib" />

  <button onclick="startSurveyor()">Aktifkan GPS</button>

  <button class="btn-green" onclick="toggleNearestStatus()">Selesai / Batalkan Terdekat</button>

  <button class="btn-red" onclick="resetPointStatus()">Reset Semua Status</button>

  <div class="box">

    <b>Status</b><br>

    Firebase: <span id="firebaseStatus" class="status-warn">menunggu...</span><br>

    GPS: <span id="gpsStatus" class="status-warn">belum aktif</span><br>

    KML: <span id="kmlStatus" class="status-warn">belum terbaca</span><br>

    Target: <span id="targetCount">0</span>

  </div>

  <div class="box">

    <b>GPS Saya</b><br>

    Nama: <span id="myName">-</span><br>

    Lat: <span id="lat">-</span><br>

    Lng: <span id="lng">-</span><br>

    Akurasi: <span id="acc">-</span> m<br>

    Terdekat: <span id="nearest">-</span><br>

    Jarak: <span id="dist">-</span> m

  </div>

  <div class="box">

    <b>Surveyor Online</b>

    <div id="activeSurveyors">-</div>

  </div>

  <div class="box">

    <b>Target GCP / ICP / BM</b>

    <div id="targetList">Belum ada titik</div>

  </div>

  <div class="box">

    <b>Chat</b>

    <div id="chatBox" class="chat-box"></div>

    <input type="text" id="chatInput" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter') sendChat()" />

    <button onclick="sendChat()">Kirim</button>

  </div>

  <div class="box">

    🔵 Surveyor<br>

    🔴 GCP | 🟠 ICP | ⚫ BM<br>

    🟢 Selesai | 🟣 Batas

  </div>

</div>

<div id="map"></div>

<script>

  const KML_URL = "https://raw.githubusercontent.com/ketuttomysuhari/MIGCP/main/lamatokan.kml";

  const firebaseConfig = {

    apiKey: "MASUKKAN_API_KEY_RESTRICTED_ANDA",

    authDomain: "callskb.firebaseapp.com",

    databaseURL: "https://callskb.firebaseio.com",

    projectId: "callskb",

    storageBucket: "callskb.appspot.com",

    messagingSenderId: "836684719733",

    appId: "1:836684719733:web:monitoring"

  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  let map;

  let targetLayer = L.featureGroup();

  let boundaryLayer = L.featureGroup();

  let surveyorLayer = L.featureGroup();

  let pointData = {};

  let pointMarkers = {};

  let pointStatuses = {};

  let surveyorMarkers = {};

  let surveyorAccuracies = {};

  let mySurveyorMarker = null;

  let mySurveyorAccuracy = null;

  let myPosition = null;

  let myRef = null;

  let watchId = null;

  const RADIUS_SELESAI = 25;

  let myId = localStorage.getItem("migcp_surveyor_id");

  if (!myId) {

    myId = "surveyor_" + Date.now() + "_" + Math.floor(Math.random() * 99999);

    localStorage.setItem("migcp_surveyor_id", myId);

  }

  initMap();

  initFirebaseStatus();

  loadKMLFromGitHub();

  listenSurveyors();

  listenPointStatus();

  listenChat();

  function initMap() {

    map = L.map("map", { zoomControl: false }).setView([-8.3, 123.1], 15);

    L.control.zoom({ position: "bottomright" }).addTo(map);

    const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {

      maxZoom: 22,

      attribution: "© OpenStreetMap"

    }).addTo(map);

    const sat = L.tileLayer(

      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",

      { maxZoom: 22, attribution: "Tiles © Esri" }

    );

    targetLayer.addTo(map);

    boundaryLayer.addTo(map);

    surveyorLayer.addTo(map);

    L.control.layers(

      { "OpenStreetMap": osm, "Satelit Esri": sat },

      {

        "Target GCP/ICP/BM": targetLayer,

        "Batas Area": boundaryLayer,

        "Surveyor Online": surveyorLayer

      },

      { position: "topright", collapsed: true }

    ).addTo(map);

  }

  function togglePanel() {

    document.getElementById("controlPanel").classList.toggle("hidden");

  }

  function getSurveyorName() {

    return document.getElementById("surveyorName").value.trim();

  }

  function requireName() {

    const name = getSurveyorName();

    if (!name) {

      alert("Isi nama surveyor terlebih dahulu.");

      return null;

    }

    localStorage.setItem("migcp_surveyor_name", name);

    document.getElementById("myName").innerText = name;

    return name;

  }

  document.getElementById("surveyorName").value = localStorage.getItem("migcp_surveyor_name") || "";

  function initFirebaseStatus() {

    db.ref(".info/connected").on("value", snap => {

      const el = document.getElementById("firebaseStatus");

      if (snap.val() === true) {

        el.innerText = "terhubung";

        el.className = "status-ok";

      } else {

        el.innerText = "tidak terhubung";

        el.className = "status-warn";

      }

    });

  }

  async function loadKMLFromGitHub() {

    try {

      const res = await fetch(KML_URL + "?t=" + Date.now());

      if (!res.ok) throw new Error("HTTP " + res.status);

      const text = await res.text();

      const kml = new DOMParser().parseFromString(text, "text/xml");

      const geojson = toGeoJSON.kml(kml);

      targetLayer.clearLayers();

      boundaryLayer.clearLayers();

      pointData = {};

      pointMarkers = {};

      const targetGeoJson = L.geoJSON(geojson, {

        filter: f => f.geometry && f.geometry.type === "Point",

        pointToLayer: function(feature, latlng) {

          const name = getName(feature);

          const type = detectType(feature, name);

          const pointId = makePointId(feature, latlng);

          const done = !!pointStatuses[pointId];

          const marker = L.circleMarker(latlng, {

            radius: type === "GCP" || type === "ICP" || type === "BM" ? 10 : 7,

            color: getPointColor(type, done),

            fillColor: getPointColor(type, done),

            fillOpacity: 0.95,

            weight: done ? 4 : 2

          });

          pointData[pointId] = { id: pointId, name, type, lat: latlng.lat, lng: latlng.lng };

          pointMarkers[pointId] = marker;

          marker.bindTooltip(name, { sticky: true, direction: "top" });

          updatePointPopup(pointId);

          return marker;

        }

      });

      const boundaryGeoJson = L.geoJSON(geojson, {

        filter: f => f.geometry && (f.geometry.type.includes("Polygon") || f.geometry.type.includes("LineString")),

        style: {

          color: "#7c3aed",

          weight: 3,

          opacity: 0.95,

          fillColor: "#a78bfa",

          fillOpacity: 0.12,

          dashArray: "8,6"

        },

        onEachFeature: function(feature, layer) {

          const name = getName(feature);

          layer.bindTooltip(name || "Batas", { sticky: true });

          layer.bindPopup(`<b>${escapeHtml(name || "Batas")}</b>`);

        }

      });

      targetGeoJson.addTo(targetLayer);

      boundaryGeoJson.addTo(boundaryLayer);

      document.getElementById("kmlStatus").innerText = "terbaca";

      document.getElementById("kmlStatus").className = "status-ok";

      document.getElementById("targetCount").innerText = Object.keys(pointData).length;

      renderTargetList();

      const all = L.featureGroup([targetLayer, boundaryLayer]);

      if (all.getBounds().isValid()) map.fitBounds(all.getBounds(), { padding: [30, 30] });

    } catch (err) {

      console.error(err);

      document.getElementById("kmlStatus").innerText = "gagal";

      document.getElementById("kmlStatus").className = "status-warn";

      alert("KML gagal dibaca. Pastikan RAW GitHub benar.");

    }

  }

  function startSurveyor() {

    const name = requireName();

    if (!name) return;

    myRef = db.ref("surveyors/" + myId);

    myRef.onDisconnect().remove();

    if (!navigator.geolocation) {

      alert("Browser tidak mendukung GPS.");

      return;

    }

    document.getElementById("gpsStatus").innerText = "meminta izin...";

    watchId = navigator.geolocation.watchPosition(

      pos => {

        const lat = pos.coords.latitude;

        const lng = pos.coords.longitude;

        const acc = pos.coords.accuracy;

        myPosition = { lat, lng, acc };

        document.getElementById("gpsStatus").innerText = "aktif";

        document.getElementById("gpsStatus").className = "status-ok";

        document.getElementById("lat").innerText = lat.toFixed(7);

        document.getElementById("lng").innerText = lng.toFixed(7);

        document.getElementById("acc").innerText = acc.toFixed(1);

        drawMySurveyorMarker(lat, lng, acc, name);

        myRef.set({

          id: myId,

          name,

          lat,

          lng,

          accuracy: acc,

          lastUpdate: Date.now()

        });

        updateNearestPoint();

        if (!window.hasCenteredGPS) {

          map.setView([lat, lng], 19);

          window.hasCenteredGPS = true;

        }

      },

      err => {

        document.getElementById("gpsStatus").innerText = "gagal";

        document.getElementById("gpsStatus").className = "status-warn";

        alert("GPS gagal: " + err.message);

      },

      { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }

    );

  }

  function drawMySurveyorMarker(lat, lng, acc, name) {

    const pos = [lat, lng];

    if (!mySurveyorMarker) {

      mySurveyorMarker = L.circleMarker(pos, {

        radius: 13,

        color: "#1d4ed8",

        fillColor: "#2563eb",

        fillOpacity: 1,

        weight: 4

      }).addTo(surveyorLayer);

      mySurveyorAccuracy = L.circle(pos, {

        radius: acc,

        color: "#2563eb",

        fillColor: "#60a5fa",

        fillOpacity: 0.15,

        weight: 1

      }).addTo(surveyorLayer);

      mySurveyorMarker.bindTooltip("Saya: " + name, { permanent: true, direction: "top" });

    } else {

      mySurveyorMarker.setLatLng(pos);

      mySurveyorAccuracy.setLatLng(pos);

      mySurveyorAccuracy.setRadius(acc);

    }

    mySurveyorMarker.bindPopup(`

      <b>Posisi Saya</b><br>

      Nama: ${escapeHtml(name)}<br>

      Lat: ${lat.toFixed(7)}<br>

      Lng: ${lng.toFixed(7)}<br>

      Akurasi: ${acc.toFixed(1)} m

    `);

  }

  function listenSurveyors() {

    db.ref("surveyors").on("value", snap => {

      const data = snap.val() || {};

      const activeIds = Object.keys(data);

      Object.keys(surveyorMarkers).forEach(id => {

        if (!data[id]) {

          surveyorLayer.removeLayer(surveyorMarkers[id]);

          surveyorLayer.removeLayer(surveyorAccuracies[id]);

          delete surveyorMarkers[id];

          delete surveyorAccuracies[id];

        }

      });

      let html = "";

      activeIds.forEach(id => {

        const s = data[id];

        html += `

          <div class="surveyor-item" onclick="focusSurveyor('${id}')">

            🔵 <b>${escapeHtml(s.name)}</b><br>

            <span class="small">${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}</span>

          </div>

        `;

        if (id === myId) return;

        const pos = [s.lat, s.lng];

        if (!surveyorMarkers[id]) {

          surveyorMarkers[id] = L.circleMarker(pos, {

            radius: 10,

            color: "#1d4ed8",

            fillColor: "#2563eb",

            fillOpacity: 1,

            weight: 3

          }).addTo(surveyorLayer);

          surveyorAccuracies[id] = L.circle(pos, {

            radius: s.accuracy || 5,

            color: "#2563eb",

            fillColor: "#60a5fa",

            fillOpacity: 0.12,

            weight: 1

          }).addTo(surveyorLayer);

        } else {

          surveyorMarkers[id].setLatLng(pos);

          surveyorAccuracies[id].setLatLng(pos);

          surveyorAccuracies[id].setRadius(s.accuracy || 5);

        }

        surveyorMarkers[id].bindTooltip(s.name, { permanent: true, direction: "top" });

        surveyorMarkers[id].bindPopup(`

          <b>${escapeHtml(s.name)}</b><br>

          Lat: ${s.lat.toFixed(7)}<br>

          Lng: ${s.lng.toFixed(7)}<br>

          Akurasi: ${(s.accuracy || 0).toFixed(1)} m

        `);

      });

      document.getElementById("activeSurveyors").innerHTML = html || "-";

    });

  }

  function listenPointStatus() {

    db.ref("pointStatus").on("value", snap => {

      pointStatuses = snap.val() || {};

      Object.keys(pointMarkers).forEach(id => refreshPointStyle(id));

      renderTargetList();

    });

  }

  function togglePointStatus(pointId) {

    const name = requireName();

    if (!name) return;

    if (pointStatuses[pointId]) {

      db.ref("pointStatus/" + pointId).remove();

    } else {

      db.ref("pointStatus/" + pointId).set({

        status: "selesai",

        by: name,

        time: Date.now()

      });

    }

  }

  function toggleNearestStatus() {

    if (!myPosition) {

      alert("Aktifkan GPS dulu.");

      return;

    }

    const nearest = getNearestPoint();

    if (!nearest) return;

    if (nearest.distance > RADIUS_SELESAI) {

      alert(`Titik terdekat ${nearest.point.name}, jarak ${nearest.distance.toFixed(2)} m. Maksimal ${RADIUS_SELESAI} m.`);

      return;

    }

    togglePointStatus(nearest.point.id);

  }

  function resetPointStatus() {

    if (!confirm("Reset semua status selesai?")) return;

    db.ref("pointStatus").remove();

  }

  function refreshPointStyle(id) {

    const p = pointData[id];

    const marker = pointMarkers[id];

    if (!p || !marker) return;

    const done = !!pointStatuses[id];

    const color = getPointColor(p.type, done);

    marker.setStyle({

      color,

      fillColor: color,

      weight: done ? 4 : 2

    });

    updatePointPopup(id);

  }

  function updatePointPopup(id) {

    const p = pointData[id];

    const marker = pointMarkers[id];

    if (!p || !marker) return;

    const done = !!pointStatuses[id];

    const status = pointStatuses[id];

    marker.bindPopup(`

      <b>${escapeHtml(p.name)}</b><br>

      Tipe: ${p.type}<br>

      Status: <b>${done ? "Selesai" : "Belum selesai"}</b><br>

      ${done ? "Oleh: " + escapeHtml(status.by || "-") + "<br>" : ""}

      Lat: ${p.lat.toFixed(7)}<br>

      Lng: ${p.lng.toFixed(7)}<br><br>

      <button onclick="togglePointStatus('${id}')" style="padding:8px 10px;border:0;border-radius:8px;background:${done ? "#dc2626" : "#16a34a"};color:white;cursor:pointer;">

        ${done ? "Batalkan Selesai" : "Tandai Selesai"}

      </button>

    `);

  }

  function sendChat() {

    const name = requireName();

    if (!name) return;

    const input = document.getElementById("chatInput");

    const text = input.value.trim();

    if (!text) return;

    db.ref("chat").push({

      name,

      text,

      time: Date.now()

    });

    input.value = "";

  }

  function listenChat() {

    db.ref("chat").limitToLast(50).on("value", snap => {

      const data = snap.val() || {};

      const box = document.getElementById("chatBox");

      box.innerHTML = Object.values(data).map(c => `

        <div class="chat-item">

          <b>${escapeHtml(c.name)}</b> - ${escapeHtml(c.text)}<br>

          <span class="small">${new Date(c.time).toLocaleTimeString()}</span>

        </div>

      `).join("");

      box.scrollTop = box.scrollHeight;

    });

  }

  function renderTargetList() {

    const points = Object.values(pointData);

    const box = document.getElementById("targetList");

    if (!points.length) {

      box.innerHTML = "Belum ada titik";

      return;

    }

    box.innerHTML = points.map(p => {

      const done = !!pointStatuses[p.id];

      return `

        <div class="target-item" onclick="focusTarget('${p.id}')">

          ${done ? "🟢" : iconByType(p.type)} <b>${escapeHtml(p.name)}</b><br>

          <span class="small">${p.type} | ${done ? "Selesai" : "Belum selesai"}</span>

        </div>

      `;

    }).join("");

  }

  function focusTarget(id) {

    const m = pointMarkers[id];

    if (!m) return;

    map.setView(m.getLatLng(), 20);

    m.openPopup();

  }

  function focusSurveyor(id) {

    if (id === myId && mySurveyorMarker) {

      map.setView(mySurveyorMarker.getLatLng(), 20);

      mySurveyorMarker.openPopup();

      return;

    }

    const m = surveyorMarkers[id];

    if (!m) return;

    map.setView(m.getLatLng(), 20);

    m.openPopup();

  }

  function getNearestPoint() {

    const points = Object.values(pointData);

    if (!points.length) return null;

    let nearest = null;

    let min = Infinity;

    points.forEach(p => {

      const d = map.distance([myPosition.lat, myPosition.lng], [p.lat, p.lng]);

      if (d < min) {

        min = d;

        nearest = p;

      }

    });

    return { point: nearest, distance: min };

  }

  function updateNearestPoint() {

    const nearest = getNearestPoint();

    if (!nearest) return;

    document.getElementById("nearest").innerText = nearest.point.name;

    document.getElementById("dist").innerText = nearest.distance.toFixed(2);

  }

  function getName(feature) {

    const p = feature.properties || {};

    return p.name || p.Name || p.NAMA || p.Nama || p.description || "Tanpa Nama";

  }

  function detectType(feature, name) {

    const text = (JSON.stringify(feature.properties || {}) + " " + name).toUpperCase();

    const geom = feature.geometry ? feature.geometry.type : "";

    if (text.includes("GCP")) return "GCP";

    if (text.includes("ICP")) return "ICP";

    if (text.includes("BM")) return "BM";

    if (geom.includes("Polygon")) return "BATAS";

    if (geom.includes("LineString")) return "BATAS";

    return "POINT";

  }

  function getPointColor(type, done) {

    if (done) return "#16a34a";

    if (type === "GCP") return "#dc2626";

    if (type === "ICP") return "#f59e0b";

    if (type === "BM") return "#0f172a";

    return "#6366f1";

  }

  function makePointId(feature, latlng) {

    return `${getName(feature)}_${latlng.lat.toFixed(7)}_${latlng.lng.toFixed(7)}`

      .replace(/[.#$[\]/\s]/g, "_");

  }

  function iconByType(type) {

    if (type === "GCP") return "🔴";

    if (type === "ICP") return "🟠";

    if (type === "BM") return "⚫";

    return "🔵";

  }

  function escapeHtml(str) {

    return String(str)

      .replaceAll("&", "&amp;")

      .replaceAll("<", "&lt;")

      .replaceAll(">", "&gt;")

      .replaceAll('"', "&quot;")

      .replaceAll("'", "&#039;");

  }

  window.addEventListener("beforeunload", () => {

    if (myRef) myRef.remove();

    if (watchId) navigator.geolocation.clearWatch(watchId);

  });

</script>

</body>

</html>
