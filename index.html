<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>MIGCP Realtime Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<button id="togglePanelBtn">☰ Menu</button>

<div class="panel" id="controlPanel">
  <h3>MIGCP Monitoring</h3>

  <input type="text" id="surveyorName" placeholder="Nama surveyor wajib" />

  <button id="btnStartGps">Aktifkan GPS</button>
  <button id="btnNearest" class="btn-green">Selesai / Batalkan Terdekat</button>
  <button id="btnReset" class="btn-red">Reset Status Titik</button>

  <div class="box">
    <b>Status</b><br>
    Firebase: <span id="firebaseStatus" class="status-warn">menunggu...</span><br>
    GPS: <span id="gpsStatus" class="status-warn">belum aktif</span><br>
    KML: <span id="kmlStatus" class="status-warn">belum terbaca</span><br>
    Target: <span id="targetCount">0</span>
  </div>

  <div class="box">
    <b>GPS Saya</b><br>
    Nama: <span id="myName">-</span><br>
    Lat: <span id="lat">-</span><br>
    Lng: <span id="lng">-</span><br>
    Akurasi: <span id="acc">-</span> m<br>
    Terdekat: <span id="nearest">-</span><br>
    Jarak: <span id="dist">-</span> m
  </div>

  <div class="box">
    <b>Surveyor Online</b>
    <div id="activeSurveyors">-</div>
  </div>

  <div class="box">
    <b>Target GCP / ICP / BM</b>
    <div id="targetList">Belum ada titik</div>
  </div>

  <div class="box">
    <b>Chat</b>
    <div id="chatBox" class="chat-box"></div>
    <input type="text" id="chatInput" placeholder="Ketik pesan..." />
    <button id="btnSendChat">Kirim</button>
  </div>

  <div class="box">
    🔵 Surveyor<br>
    🔴 GCP | 🟠 ICP | ⚫ BM<br>
    🟢 Selesai | 🟣 Batas
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>

</body>
</html>
